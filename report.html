<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقرير إشرافي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; direction: rtl; margin: 40px; background: #f8fafc; }
    .container { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #1e40af; }
    .field { margin: 25px 0; }
    .label { font-weight: bold; color: #334155; margin-bottom: 8px; }
    .value { background: #f1f5f9; padding: 18px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 17px; }
    .print-btn {
      display: block; margin: 40px auto; padding: 16px 40px; background: #2563eb; color: white;
      border: none; border-radius: 50px; font-size: 18px; cursor: pointer;
    }
    @media print {
      .print-btn { display: none; }
      body { margin: 0; background: white; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>تقرير إشرافي</h1>
    
    <div class="field">
      <div class="label">اسم المدرسة</div>
      <div class="value">الثانوية الخامسة</div>
    </div>
    
    <div class="field">
      <div class="label">اسم المعلمة</div>
      <div class="value">ريم</div>
    </div>
    
    <div class="field">
      <div class="label">التاريخ</div>
      <div class="value">٢٠٢٦/٠٤/٣٠</div>
    </div>
    
    <div class="field">
      <div class="label">وصف الزيارة</div>
      <div class="value">تم حضور الحصة ومتابعة مستوى التفاعل لدى الطالبات، مع تقديم تغذية راجعة داعمة لتحسين استراتيجيات التدريس.</div>
    </div>

    <button class="print-btn" onclick="window.print()">🖨️ طباعة التقرير / حفظ PDF</button>
  </div>
</body>
</html>
